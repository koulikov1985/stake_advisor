services:
  # Backend API
  - type: web
    name: stake-advisor
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://license-keys-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: license-keys-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_DAILY
        sync: false
      - key: STRIPE_PRICE_WEEKLY
        sync: false
      - key: STRIPE_PRICE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_YEARLY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false

  # Frontend
  - type: web
    name: license-keys-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://stake-advisor.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
